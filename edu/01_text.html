<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 관련 태그</title>
</head>
<body>
  <!-- 제목 또는 부제목 태그 -->
  <h1>tag</h1>
  <h2>h2 tag</h2>
  <h3>h3 tag</h3>
  <h4>h4 tag</h4>
  <h5>h5 tag</h5>
  <h6>h6 tag</h6>

  <!-- 가로선 -->
  <hr>
  <!-- 개행 -->
  동해물과<br>백두산이
  <!-- 하나의 문단  -->
  <p>첫번 째 문단입니다.</p>
  <p>두번 째 문단입니다.</p>
  <p>세번 째 문단입니다.</p>
  <p>네번 째 문단입니다.</p>
  <!-- strong, b 텍스트 진하게 강조 -->
  <strong>스트롱</strong>
  <b>비</b>
  <!-- 텍스트 이텔리체로 강조 -->
  <em>이엠</em>
  <i>아이</i>
</body>
</html>
