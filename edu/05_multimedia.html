<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutimedia</title>
</head>
<body>
  <!-- audio 태그 : 웹 문서에 소리 콘텐츠를 삽입 -->
  <audio src="./vidio.mp4" controls></audio>

  <!-- vidio 태그 : 웹 문서에 비디오 콘텐츠를 삽입 -->
  <video src="./vidio.mp4" poster="./cat1.jpg" controls width="200px" muted loop ></video>
</body>
</html>
